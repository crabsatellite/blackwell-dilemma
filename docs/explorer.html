<!DOCTYPE html>
<html lang="zh" id="htmlRoot">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blackwell 困境 — 交互式解读</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Segoe UI','Microsoft YaHei',sans-serif;background:#f8f9fa;color:#333}

header{background:#1a1a2e;color:#fff;padding:14px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
header h1{font-size:17px;font-weight:600}
.lang-sw{margin-left:auto;display:flex;gap:2px;background:rgba(255,255,255,.1);border-radius:6px;overflow:hidden}
.lang-sw button{padding:4px 12px;background:transparent;border:none;color:rgba(255,255,255,.5);font-size:12px;cursor:pointer}
.lang-sw button.active{background:rgba(255,255,255,.15);color:#ffd700}

.progress-bar{display:flex;background:#fff;border-bottom:1px solid #e0e0e0;padding:0 16px;overflow-x:auto}
.step-dot{padding:10px 14px;font-size:12px;color:#aaa;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:.2s}
.step-dot:hover{color:#666}
.step-dot.active{color:#1a1a2e;border-bottom-color:#ffd700;font-weight:600}

.main{display:flex;justify-content:center;min-height:calc(100vh - 95px);padding:20px}
.content{max-width:820px;width:100%}

.card{background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);padding:24px;margin-bottom:16px}
.card h2{font-size:18px;margin-bottom:12px;color:#1a1a2e}
.card p,.card li{font-size:14px;line-height:1.9;color:#555;margin-bottom:10px}
.card ul{padding-left:1.5em;margin-bottom:10px}
.card .hl{background:#fff8e1;border-left:4px solid #ffd700;padding:10px 14px;border-radius:0 8px 8px 0;margin:12px 0;font-size:14px;line-height:1.8}
.card .hl-blue{background:#e8f0fe;border-left:4px solid #4285f4;padding:10px 14px;border-radius:0 8px 8px 0;margin:12px 0;font-size:14px;line-height:1.8}
.card .try-it{background:#e8f5e9;border:1px solid #c8e6c9;border-radius:8px;padding:12px;margin:12px 0;font-size:13px;line-height:1.8}
.card .try-it b{color:#2e7d32}
.card .warn{background:#fce4ec;border:1px solid #f8bbd0;border-radius:8px;padding:12px;margin:12px 0;font-size:13px;line-height:1.8}
.formula{display:inline-block;background:#f0f4ff;padding:3px 10px;border-radius:6px;font-family:'Courier New',monospace;color:#2c3e50;font-size:14px;margin:3px 0}

canvas{border:1px solid #eee;border-radius:10px;background:#fafafa;display:block;margin:10px auto}

.ctrl{display:flex;gap:8px;align-items:center;margin:10px 0;flex-wrap:wrap}
.ctrl label{font-size:13px;color:#666}
.ctrl input[type=range]{flex:1;max-width:300px}
.ctrl .val{font-weight:700;color:#1a1a2e;min-width:50px;font-size:14px}

.btn{padding:8px 18px;border:none;border-radius:8px;font-size:13px;cursor:pointer;transition:.2s}
.btn-primary{background:#1a1a2e;color:#fff}.btn-primary:hover{background:#2a2a4e}
.btn-choice{background:#fff;border:2px solid #ddd;border-radius:10px;padding:12px 20px;font-size:14px;cursor:pointer;transition:.2s;min-width:120px}
.btn-choice:hover{border-color:#ffd700;background:#fff8e1}
.btn-choice.picked{border-color:#4caf50;background:#e8f5e9}
.btn-choice.bad{border-color:#e74c3c;background:#fce4ec}
.choice-row{display:flex;gap:12px;justify-content:center;margin:14px 0;flex-wrap:wrap}

.data-table{width:100%;border-collapse:collapse;font-size:13px;margin:10px 0}
.data-table th{background:#f5f5f5;padding:8px;text-align:center;font-weight:600;border-bottom:2px solid #eee}
.data-table td{padding:6px 8px;text-align:center;border-bottom:1px solid #f0f0f0}
.data-table tr.hl-row{background:#fff8e1;font-weight:600}
.data-table tr:hover{background:#f8f8f8}

.result-box{text-align:center;padding:16px;border-radius:10px;margin:12px 0;font-size:15px;font-weight:600}
.result-good{background:#e8f5e9;color:#2e7d32}
.result-bad{background:#fce4ec;color:#c62828}

.grid-container{display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap;justify-content:center}
.grid-stats{font-size:13px;line-height:2;min-width:180px}
.grid-stats b{color:#1a1a2e}

.legend{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin:8px 0;font-size:13px}
.legend span{display:flex;align-items:center;gap:4px}
.legend-line{display:inline-block;width:24px;height:3px;border-radius:2px}

.regime-box{text-align:center;padding:10px;border-radius:8px;margin:8px 0;font-size:14px;font-weight:600}
.regime-good{background:#e8f5e9;color:#2e7d32}
.regime-bad{background:#fce4ec;color:#c62828}
.regime-near{background:#fff3e0;color:#e65100}

.nav-row{display:flex;justify-content:space-between;margin-top:16px}

@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease}

@media(max-width:600px){
  header{padding:10px 16px}
  header h1{font-size:14px}
  .card{padding:16px}
  .card h2{font-size:16px}
  .grid-container{flex-direction:column;align-items:center}
  canvas{max-width:100%;height:auto}
  .ctrl input[type=range]{max-width:100%}
  .btn-choice{min-width:90px;padding:10px 14px;font-size:13px}
  .choice-row{gap:8px}
  .data-table{font-size:11px}
  .data-table th,.data-table td{padding:4px}
  .grid-stats{min-width:auto;width:100%}
  .formula{font-size:12px;word-break:break-all}
  .progress-bar{padding:0 8px}
  .step-dot{padding:8px 10px;font-size:11px}
  .legend{font-size:11px;gap:10px}
}
</style>
</head>
<body>

<header>
  <h1 id="headerTitle">Blackwell 困境 — 交互式解读</h1>
  <div class="lang-sw">
    <button data-lang="zh">中文</button>
    <button data-lang="en">EN</button>
  </div>
</header>

<div class="progress-bar" id="progressBar"></div>

<div class="main">
  <div class="content" id="vizArea"></div>
</div>

<script>
// ========== i18n ==========
let lang = (navigator.language || '').startsWith('zh') ? 'zh' : 'en';
const L = {
zh: {
  title: 'Blackwell 困境 — 交互式解读',
  header: 'Blackwell 困境 — 交互式解读',
  steps: [
    '① 选择与回报','② 信息的力量','③ 走了就回不来',
    '④ 岔路口游戏','⑤ 只看眼前的代价','⑥ 路标不是地图',
    '⑦ 不是信息的错','⑧ 最佳模糊度','⑨ 堵一半就变天','⑩ 三个教训'
  ],

  // ---- Step 0 ----
  s0_title: '每个人每天都在做选择',
  s0_p1: '中午去食堂，四个窗口分别卖红烧肉、糖醋排骨、炒青菜、咖喱鸡。你选哪个？',
  s0_p2: '每个菜都有一个「回报」——好吃程度的打分。你当然想选分高的，但你事先不一定知道每道菜几分。',
  s0_p3: '数学上可以把这件事简化：面前有若干选项，每个选项有一个分数（回报），你想挑到最大的。这种简化就叫「模型」。',
  s0_hl: '选择问题 = 从若干选项中挑回报最大的',
  s0_try: '点一点下面的选项，看看你能不能挑到最大的回报。',

  // ---- Step 1 ----
  s1_title: '信息帮你选得更好',
  s1_p1: '如果你完全不知道哪个好，只能闭着眼睛随便选一个。选到最好的全靠运气。',
  s1_p2: '但如果有人提前告诉你「今天A窗口的红烧肉特别好」，你就更有把握了。这种帮你判断的线索叫<b>信息</b>（也叫信号）。',
  s1_p3: '信号不一定完全准确。朋友说「好吃」，实际可能只是一般般。信号有个<b>精度</b>：精度高的信号靠谱，精度低的模模糊糊。下面我们用字母 β（读作 beta）表示精度，β 越大信号越准。',
  s1_hl: '有个叫 Blackwell 的数学家，在1953年证明了一件事：<b>信号越准确，你的选择就越好。</b>',
  s1_p4: '这不是很明显吗？谁会嫌自己知道的太多？——但这个结论有个前提条件，后面我们会看到。',
  s1_try: '拖动下面的滑块调整信号精度 β，看看你的平均得分怎么变。精度越高，得分越高。',
  s1_lbl: '信号精度 β',
  s1_avg: '平均得分',

  // ---- Step 2 ----
  s2_title: '可是，有些路走了就回不来',
  s2_p1: 'Blackwell的结论有个前提：<b>你想选什么就能选什么</b>。所有选项摆在桌上，想选哪个选哪个。',
  s2_p2: '但现实中很多选择是<b>单行道</b>。你走了这条路，另一条就到不了了。',
  s2_p3: '比如：',
  s2_examples: '<ul><li>选了文科班，就很难再转理科</li><li>签了两年的租房合同，中途退租要赔钱</li><li>一款App积累了大量数据，想换到另一款就得从头开始</li></ul>',
  s2_p4: '这种「走了就回不来」叫<b>不可逆性</b>。',
  s2_hl: '问题来了：当选择是单行道的时候，信号越准确还是越好吗？',

  // ---- Step 3 ----
  s3_title: '一个岔路口的游戏',
  s3_p1: '接下来我们用一个简化的分数来说明问题：0分最差，1分最好。',
  s3_p1b: '你站在起点 S，面前有两条路：',
  s3_desc_a: '<b>向左走到 A</b>：回报 0.6（看起来不错）<br>但 A 是个死胡同，到了 A 就没路了。',
  s3_desc_b: '<b>向右走到 B</b>：回报 0.4（看起来一般）<br>但 B 后面连着一个 G，G 的回报是 1.0！',
  s3_p2: '你只能看到 A 和 B 的回报，看不到后面有没有路。你选哪个？',
  s3_try: '点击选择你的路线：',
  s3_btn_a: '走 A（回报 0.6）',
  s3_btn_b: '走 B（回报 0.4）',
  s3_result_a: '你到了 A，拿到 0.6 分。但 A 是死胡同，游戏结束了。如果你选了 B，就能继续走到 G 拿 1.0 分。',
  s3_result_b: '你到了 B（0.4分），发现后面还有路！继续走到 G，拿到 1.0 分。',
  s3_moral: '看到了吗？眼前回报更高的 A 其实是陷阱。回报较低的 B 才是通往最高分的桥梁。',
  s3_reset: '再玩一次',

  // ---- Step 4: REFRAMED ----
  s4_title: '只看眼前的代价',
  s4_p1: '刚才你可以仔细想再选。但如果有个人只看信号——哪个回报高就选哪个，完全不看后面的路——会怎样？',
  s4_p2: '我们管这种人叫<b>「只看眼前」的人</b>。信号说哪个回报高，他就选哪个，完全不管这条路后面通不通。',
  s4_cases: '<ul><li><b>β 接近 0（信号几乎没用）</b>：分不清 A 和 B 谁高，等于随机选。一半概率选A拿0.6，一半选B再走到G拿1.0。平均得分 = <span class="formula">0.5 × 0.6 + 0.5 × 1.0 = 0.80</span></li><li><b>β 非常大（信号完全准确）</b>：清清楚楚看到A是0.6、B是0.4。A更高，一定选A。得分 = <span class="formula">0.6</span></li></ul>',
  s4_hl: '对这个「只看眼前」的人来说，信号从完全没用变成完全准确，平均得分从 0.80 掉到 0.60。知道得越清楚，选得越差！',
  s4_compound: '而且如果不只是一个岔路口，而是连着好几个——每个路口都可能走错——那全走对的概率会<b>缩得特别快</b>（比如每个路口走对的概率是一半，三个路口就是 ½×½×½ = ⅛）。路口越多，「只看眼前」的人越惨。',
  s4_but: '但这真的是信息的错吗？还是这个人自己有问题？继续往下看。',
  s4_try: '拖动滑块，观察信号精度和平均得分的关系：',
  s4_lbl: '信号精度 β',
  s4_score: '平均得分',
  s4_trap: '走进陷阱A的概率',

  // ---- Step 5: REFRAMED ----
  s5_title: '路标不是地图',
  s5_p1: '为什么「只看眼前」的人会越知道越差？因为信号只告诉你眼前每条路的回报多高，就像路标上写着「前方风景80分」。',
  s5_p2: '但信号不告诉你这条路通不通、通到哪里。你手上没有地图。',
  s5_p3: '我们给这两样东西起个名字：',
  s5_terms: '<ul><li><b>道路结构</b> = 哪些路是通的，哪些路是堵的 = 你的地图</li><li><b>信号</b> = 每条路的回报有多高 = 路标</li></ul>',
  s5_p4: '信号再准确，也改变不了哪条路是通的。A是死胡同这个事实，不会因为你测量得更精确就消失。',
  s5_hl: '你拿到的分数和满分之间的差距，就是你的「损失」。论文证明，这个损失可以拆成两部分：<br><br><span class="formula">总损失 = 道路损失（路不通造成的）+ 信号损失（看不准回报造成的）</span><br><br>道路损失是<b>死的</b>——路不通就是路不通，不管你的信号多准都改变不了。信号损失才是信号能改善的部分。',
  s5_p5: '所以当精度已经很高的时候，信号能管的那部分几乎为零，剩下的全是道路损失。',
  s5_bridge: '但问题来了：如果你不只有路标，还有<b>地图</b>呢？能看到路通不通的人，还会掉进陷阱吗？',

  // ---- Step 6: NEW — Cognitive Depth ----
  s6_title: '不是信息的错',
  s6_p1: '前面我们看到，「只看眼前」的人信号越准选得越差。但这真的是信息的错吗？',
  s6_p2: '论文的答案是：<b>不是。</b>问题出在这个人身上——他只看到了每条路的回报，却看不到路通不通。',
  s6_p3: '我们用一个字母 κ（读作 kappa，像英文字母 K 的发音）来表示「你能看多远」：',
  s6_kappa: '<ul><li><b>κ = 0（路盲）</b>：完全看不到路况。只看每条路的回报分数。就是前面那个掉进陷阱的人。</li><li><b>κ 很大（有地图）</b>：能看到哪条路通、哪条是死胡同、后面连着什么。</li></ul>',
  s6_p4: '论文证明了一件关键的事——存在一条<b>视力分界线</b>：',
  s6_hl: '存在一条分界线。<br>• 视力超过分界线：信息越多越好，Blackwell说的没错<br>• 视力不到分界线：信息越多反而越差',
  s6_p5: '换句话说：<b>Blackwell定理没有错。</b>它只是需要你有足够的「视力」——看得到路况，而不只是看到回报分数。',
  s6_p6: '一个能看到全局路况的聪明人，信息越多<b>永远</b>越好。掉进陷阱不是因为知道太多，是因为<b>只看眼前最好的，没看到路通向哪里</b>——你追求的是「眼前最好」而不是「最终最好」。',
  s6_p7: '而且论文还发现了一个有趣的事：即使你看不到路况（κ 很低），如果做选择时不只看分数，还跟着自己的感觉走——比如选专业时考虑自己的兴趣，而不是只看薪资排名——你就不会被信号完全牵着走，也就不容易掉进陷阱。<b>跟着感觉走，反而有保护作用。</b>',
  s6_try: '下面的图有三条曲线。<span style="color:#e74c3c">红色虚线</span>是路盲（κ=0），<span style="color:#2ecc71">绿色虚线</span>是有地图的人。拖动 κ 滑块看<span style="color:#7c3aed">紫色实线</span>怎么变：',
  s6_lbl_beta: '信号精度 β',
  s6_lbl_kappa: '视力 κ',
  s6_score: '当前得分',
  s6_regime_good: 'κ > κ*：信息越多越好',
  s6_regime_bad: 'κ < κ*：信息越多越差',
  s6_regime_near: '接近门槛 κ*',
  s6_legend_greedy: '路盲 (κ=0)',
  s6_legend_bayesian: '有地图',
  s6_legend_current: '当前 κ',

  // ---- Step 7: Sweet Spot (was step 6) ----
  s7_title: '有时候看不清反而更好',
  s7_p1: '对「只看眼前」的人来说，信号总是坏事吗？也不一定。',
  s7_p2: '如果 B 后面不只有 G（好目标，回报1.0），还有一个 D（坏选项，回报只有0.1）呢？到了B之后你要在G和D之间再做一次选择。',
  s7_p3: '这下情况变了：',
  s7_tradeoff: '<ul><li>在起点 S：信号越准，越容易选A掉进陷阱（坏事）</li><li>在中途 B：信号越准，越容易分清G和D选对路（好事）</li></ul>',
  s7_p4: '一个把你推进陷阱，一个帮你选对路。两股力量拉扯，存在一个<b>最佳精度</b>，刚好在它们之间取得平衡。',
  s7_try: '拖动滑块看损失怎么变化。找到那个最低点：',
  s7_lbl: '信号精度 β',
  s7_loss: '平均损失',
  s7_ptrap: '掉进陷阱的概率',
  s7_pgoal: '到B后选对G的概率',
  s7_table_title: '论文中的数据：',
  s7_table_note: '信号完全准确时损失是 0.400，但最佳精度（β≈1.5）时损失只有 0.273。知道得太清楚，反而不如「刚刚好」！',

  // ---- Step 8: Phase Transition (was step 7) ----
  s8_title: '堵一半的路就变天：临界点',
  s8_p1: '前面的例子都是小路口。如果把道路网络放大到一整座城市呢？',
  s8_p2: '想象一个大网格，每个路口是一个选择，每条路都有可能被堵住（我们用 p 表示堵住的概率，p=0.5 就是一半的路被堵）。你从一个路口出发，只能走没被堵住的路。',
  s8_p3: '数学家已经精确地证明了：在这种棋盘格上，分界线恰好是 <b>p = 0.5</b>。',
  s8_phases: '<ul><li><b>p 小于 0.5</b>（堵的路不到一半）：大部分路口都能走到，你被困在小角落的概率很低。信号有用，Blackwell的结论基本成立。</li><li><b>p 大于 0.5</b>（堵的路超过一半）：你几乎一定被困在一个很小的区域。信号再准确也帮不了你，因为好选项你根本走不到。</li></ul>',
  s8_p4: '这种突然的翻转，和水到了0°C突然结冰很像——说变就变，没有中间状态。在 p=0.5 以下，信息有用；在 p=0.5 以上，信息失效。',
  s8_p5: '不只是棋盘格有这种突变。朋友圈、互联网这些真实的网络上也会突然翻转——只是翻转的位置不同。在像微博这种「少数大V有很多粉丝」的网络里，大V把大家都连在了一起，路几乎永远是通的，所以信号精度反而才是关键。',
  s8_try: '拖动滑块调整堵路概率 p，看看从起点（红色）能走到的区域（绿色）怎么变化：',
  s8_lbl: '堵路概率 p',
  s8_reach: '能走到的路口数',
  s8_total: '总路口数',
  s8_frac: '能走到的比例',
  s8_regen: '重新生成',

  // ---- Step 9: Three Lessons (NEW) ----
  s9_title: '三个教训',
  s9_p1: '这篇论文的发现可以总结为三条教训：',

function T(k){ return L[lang][k] || L['zh'][k] || k; }

// ========== Normal CDF (Abramowitz & Stegun 7.1.26) ==========
function normalCDF(x){
  const a1=0.254829592,a2=-0.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=0.3275911;
  const sign = x<0?-1:1;
  const ax = Math.abs(x)/Math.SQRT2;
  const t = 1/(1+p*ax);
  const y = 1-(((((a5*t+a4)*t)+a3)*t+a2)*t+a1)*t*Math.exp(-ax*ax);
  return 0.5*(1+sign*y);
}

// ========== Welfare functions ==========
// 4-state greedy welfare: W(β) = expected payoff for greedy agent
function welfare4(beta){
  if(beta<=0.01) return 0.80;
  const sig2 = 1/(Math.pow(2,2*beta)-1);
  const phi = normalCDF(0.2/Math.sqrt(2*sig2));
  return phi*0.6 + (1-phi)*1.0;
}

// 4-state Bayesian welfare: agent knows topology (A=dead end, B→G=1.0)
function bayesianWelfare4(beta){
  if(beta<=0.01) return 0.80;
  const sig2 = 1/(Math.pow(2,2*beta)-1);
  const pCorrect = normalCDF(0.4/Math.sqrt(2*sig2));
  return pCorrect*1.0 + (1-pCorrect)*0.6;
}

// Blended welfare: smooth transition between greedy and Bayesian via κ
function blendedWelfare4(beta, kappa){
  const kstar = 0.7;
  const f = 1/(1+Math.exp(-6*(kappa-kstar)));
  return f * bayesianWelfare4(beta) + (1-f) * welfare4(beta);
}

// 5-state expected loss: L(β) = r* - E[payoff]
function loss5(beta){
  if(beta<=0.01) return 0.425;
  const sig2 = 1/(Math.pow(2,2*beta)-1);
  const pTrap = normalCDF(0.2/Math.sqrt(2*sig2));
  const pGoal = normalCDF(0.9/Math.sqrt(2*sig2));
  return pTrap*0.4 + (1-pTrap)*(1-pGoal)*0.9;
}

// Step 1 demo: 2-option Blackwell
function simpleBlackwell(beta){
  if(beta<=0.01) return 0.65;
  const sig2 = 1/(Math.pow(2,2*beta)-1);
  const pBest = normalCDF(0.5/Math.sqrt(2*sig2));
  return pBest*0.9 + (1-pBest)*0.4;
}

function buildProgress(){
  const bar = document.getElementById('progressBar');
  bar.innerHTML = '';
  const names = T('steps');
  for(let i=0;i<STEPS;i++){
    const d = document.createElement('div');

function navHTML(){

}

// ========== Drawing: 4-state graph ==========
function drawGraph4(canvasId, highlight){
  const c = document.getElementById(canvasId);
  if(!c) return;
  const ctx = c.getContext('2d');
  const W=c.width, H=c.height;
  ctx.clearRect(0,0,W,H);

  const nodes = {
    S:{x:W*0.15,y:H*0.5,r:'0',color:'#666'},
    A:{x:W*0.55,y:H*0.22,r:'0.6',color:'#e74c3c'},
    B:{x:W*0.55,y:H*0.78,r:'0.4',color:'#3498db'},
    G:{x:W*0.88,y:H*0.78,r:'1.0',color:'#2ecc71'}
  };

  ctx.lineWidth=3;
  [{a:'S',b:'A',col:'#e74c3c'},{a:'S',b:'B',col:'#3498db'},{a:'B',b:'G',col:'#2ecc71'}].forEach(e=>{
    ctx.strokeStyle = e.col; ctx.globalAlpha=0.4;
    ctx.beginPath(); ctx.moveTo(nodes[e.a].x,nodes[e.a].y); ctx.lineTo(nodes[e.b].x,nodes[e.b].y); ctx.stroke();
  });
  ctx.globalAlpha=1;

  ctx.fillStyle='#e74c3c'; ctx.globalAlpha=0.15;
  ctx.beginPath(); ctx.arc(nodes.A.x,nodes.A.y,38,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;

  Object.entries(nodes).forEach(([name,n])=>{
    const isHl = highlight && highlight.includes(name);
    ctx.fillStyle = isHl ? n.color : '#f5f5f5';
    ctx.strokeStyle = n.color; ctx.lineWidth = isHl?3:2;
    ctx.beginPath(); ctx.arc(n.x,n.y,24,0,Math.PI*2);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = isHl?'#fff':'#333';
    ctx.font = 'bold 16px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(name,n.x,n.y-5);
    ctx.font = '11px sans-serif'; ctx.fillStyle=isHl?'rgba(255,255,255,0.8)':'#999';
    ctx.fillText(n.r,n.x,n.y+12);
  });

  ctx.fillStyle='#c0392b'; ctx.font='11px sans-serif'; ctx.textAlign='center';
  ctx.fillText(lang==='zh'?'死胡同':'dead end',nodes.A.x,nodes.A.y-36);
}

// ========== Drawing: single curve ==========
function drawCurve(canvasId, fn, xMin, xMax, opts){
  const c = document.getElementById(canvasId);
  if(!c) return;
  const ctx = c.getContext('2d');
  const W=c.width, H=c.height;
  const pad={l:50,r:20,t:20,b:35};
  const pw=W-pad.l-pad.r, ph=H-pad.t-pad.b;
  ctx.clearRect(0,0,W,H);

  const pts=[];
  let yMin=Infinity, yMax=-Infinity;
  for(let i=0;i<=200;i++){
    const x=xMin+(xMax-xMin)*i/200;
    const y=fn(x);
    pts.push({x,y});
    if(y<yMin)yMin=y; if(y>yMax)yMax=y;
  }
  if(opts.yMin!==undefined) yMin=opts.yMin;
  if(opts.yMax!==undefined) yMax=opts.yMax;
  const yRange=yMax-yMin||1;

  function toCanvas(x,y){
    return { cx: pad.l + (x-xMin)/(xMax-xMin)*pw, cy: pad.t + (1-(y-yMin)/yRange)*ph };
  }

  ctx.strokeStyle='#ccc'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(pad.l,pad.t); ctx.lineTo(pad.l,H-pad.b); ctx.lineTo(W-pad.r,H-pad.b); ctx.stroke();

  ctx.fillStyle='#999'; ctx.font='11px sans-serif'; ctx.textAlign='right'; ctx.textBaseline='middle';
  for(let i=0;i<=4;i++){
    const y=yMin+yRange*i/4;
    const p=toCanvas(xMin,y);
    ctx.fillText(y.toFixed(2),pad.l-6,p.cy);
    if(i>0&&i<4){ctx.strokeStyle='#eee';ctx.beginPath();ctx.moveTo(pad.l,p.cy);ctx.lineTo(W-pad.r,p.cy);ctx.stroke();}
  }
  ctx.textAlign='center'; ctx.textBaseline='top';
  for(let i=0;i<=4;i++){
    const x=xMin+(xMax-xMin)*i/4;
    const p=toCanvas(x,yMin);
    ctx.fillText(x.toFixed(1),p.cx,p.cy+4);
  }
  ctx.fillText(opts.xLabel||'β',W-pad.r,H-pad.b+4);

  ctx.strokeStyle=opts.color||'#1a1a2e'; ctx.lineWidth=2.5;
  ctx.setLineDash([]);
  ctx.beginPath();
  pts.forEach((p,i)=>{
    const cc=toCanvas(p.x,p.y);
    i===0?ctx.moveTo(cc.cx,cc.cy):ctx.lineTo(cc.cx,cc.cy);
  });
  ctx.stroke();

  if(opts.markX!==undefined){
    const my=fn(opts.markX);
    const mc=toCanvas(opts.markX,my);
    ctx.fillStyle=opts.color||'#1a1a2e';
    ctx.beginPath(); ctx.arc(mc.cx,mc.cy,5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#333'; ctx.font='bold 12px sans-serif'; ctx.textAlign='left';
    ctx.fillText(my.toFixed(3), mc.cx+8, mc.cy-6);
  }

  if(opts.markMin){
    let minY=Infinity, minX=0;
    pts.forEach(p=>{ if(p.y<minY){minY=p.y;minX=p.x;} });
    const mc=toCanvas(minX,minY);
    ctx.fillStyle='#e74c3c';
    ctx.beginPath(); ctx.arc(mc.cx,mc.cy,5,0,Math.PI*2); ctx.fill();
    ctx.font='bold 11px sans-serif'; ctx.textAlign='left';
    ctx.fillText('min: '+minY.toFixed(3)+' @ β≈'+minX.toFixed(1), mc.cx+8, mc.cy+4);
  }
}

// ========== Drawing: cognitive depth chart (dual + blended curves) ==========
function drawCognitiveChart(canvasId, kappa, betaMark){
  const c = document.getElementById(canvasId);
  if(!c) return;
  const ctx = c.getContext('2d');
  const W=c.width, H=c.height;
  const pad={l:50,r:20,t:20,b:35};
  const pw=W-pad.l-pad.r, ph=H-pad.t-pad.b;
  ctx.clearRect(0,0,W,H);

  const xMin=0, xMax=5, yMin=0.55, yMax=1.05;
  const yRange=yMax-yMin;
  function toC(x,y){ return {cx:pad.l+(x-xMin)/(xMax-xMin)*pw, cy:pad.t+(1-(y-yMin)/yRange)*ph}; }

  // Axes
  ctx.strokeStyle='#ccc'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(pad.l,pad.t); ctx.lineTo(pad.l,H-pad.b); ctx.lineTo(W-pad.r,H-pad.b); ctx.stroke();

  ctx.fillStyle='#999'; ctx.font='11px sans-serif';
  ctx.textAlign='right'; ctx.textBaseline='middle';
  for(let i=0;i<=4;i++){
    const y=yMin+yRange*i/4;
    const p=toC(xMin,y);
    ctx.fillText(y.toFixed(2),pad.l-6,p.cy);
    if(i>0&&i<4){ctx.strokeStyle='#eee';ctx.beginPath();ctx.moveTo(pad.l,p.cy);ctx.lineTo(W-pad.r,p.cy);ctx.stroke();}
  }
  ctx.textAlign='center'; ctx.textBaseline='top';
  for(let i=0;i<=4;i++){
    const x=xMin+(xMax-xMin)*i/4;
    const p=toC(x,yMin);
    ctx.fillText(x.toFixed(1),p.cx,p.cy+4);
  }
  ctx.fillText('β',W-pad.r,H-pad.b+4);

  // Generate curve points
  const N=200;
  function genPts(fn){ const a=[]; for(let i=0;i<=N;i++){const x=xMin+(xMax-xMin)*i/N; a.push({x,y:fn(x)});} return a; }
  const greedyPts = genPts(welfare4);
  const bayesPts = genPts(bayesianWelfare4);
  const blendPts = genPts(b=>blendedWelfare4(b,kappa));

  // Draw greedy curve (red, dashed)
  ctx.setLineDash([6,4]); ctx.strokeStyle='#e74c3c'; ctx.lineWidth=2;
  ctx.beginPath();
  greedyPts.forEach((p,i)=>{ const cc=toC(p.x,p.y); i===0?ctx.moveTo(cc.cx,cc.cy):ctx.lineTo(cc.cx,cc.cy); });
  ctx.stroke();

  // Draw Bayesian curve (green, dashed)
  ctx.strokeStyle='#2ecc71';
  ctx.beginPath();
  bayesPts.forEach((p,i)=>{ const cc=toC(p.x,p.y); i===0?ctx.moveTo(cc.cx,cc.cy):ctx.lineTo(cc.cx,cc.cy); });
  ctx.stroke();

  // Draw blended curve (purple, solid)
  ctx.setLineDash([]); ctx.strokeStyle='#7c3aed'; ctx.lineWidth=3;
  ctx.beginPath();
  blendPts.forEach((p,i)=>{ const cc=toC(p.x,p.y); i===0?ctx.moveTo(cc.cx,cc.cy):ctx.lineTo(cc.cx,cc.cy); });
  ctx.stroke();

  // Mark β dot on blended curve
  if(betaMark!==undefined){
    const my=blendedWelfare4(betaMark,kappa);
    const mc=toC(betaMark,my);
    ctx.fillStyle='#7c3aed';
    ctx.beginPath(); ctx.arc(mc.cx,mc.cy,5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#333'; ctx.font='bold 12px sans-serif'; ctx.textAlign='left';
    ctx.fillText(my.toFixed(3), mc.cx+8, mc.cy-6);
  }

  // Curve endpoint labels
  const gEnd=toC(xMax,welfare4(xMax)), bEnd=toC(xMax,bayesianWelfare4(xMax));
  ctx.font='bold 10px sans-serif'; ctx.textAlign='right';
  ctx.fillStyle='#e74c3c'; ctx.fillText('κ=0',gEnd.cx-4,gEnd.cy+12);
  ctx.fillStyle='#2ecc71'; ctx.fillText(lang==='zh'?'有地图':'map',bEnd.cx-4,bEnd.cy-8);
}

// ========== Percolation grid ==========
let gridData = null;
function generateGrid(n, p){
  const hEdges = [], vEdges = [];
  for(let r=0;r<n;r++){
    hEdges[r]=[]; vEdges[r]=[];
    for(let c=0;c<n;c++){
      hEdges[r][c] = c<n-1 ? Math.random()>p : false;
      vEdges[r][c] = r<n-1 ? Math.random()>p : false;
    }
  }
  const sr=Math.floor(n/2), sc=Math.floor(n/2);
  const visited = Array.from({length:n},()=>Array(n).fill(false));
  const queue = [[sr,sc]];
  visited[sr][sc]=true;
  let count=1;
  while(queue.length){
    const [r,c]=queue.shift();
    if(c<n-1 && hEdges[r][c] && !visited[r][c+1]){visited[r][c+1]=true;queue.push([r,c+1]);count++;}
    if(c>0 && hEdges[r][c-1] && !visited[r][c-1]){visited[r][c-1]=true;queue.push([r,c-1]);count++;}
    if(r<n-1 && vEdges[r][c] && !visited[r+1][c]){visited[r+1][c]=true;queue.push([r+1,c]);count++;}
    if(r>0 && vEdges[r-1][c] && !visited[r-1][c]){visited[r-1][c]=true;queue.push([r-1,c]);count++;}
  }
  return {n, hEdges, vEdges, visited, sr, sc, count, total:n*n};
}

function drawGrid(canvasId){
  if(!gridData) return;
  const c = document.getElementById(canvasId);
  if(!c) return;
  const ctx = c.getContext('2d');
  const W=c.width,H=c.height;
  ctx.clearRect(0,0,W,H);
  const {n,hEdges,vEdges,visited,sr,sc}=gridData;
  const pad=12;
  const cell = (Math.min(W,H)-2*pad)/n;

  function pos(r,cc){ return {x:pad+cc*cell+cell/2, y:pad+r*cell+cell/2}; }

  for(let r=0;r<n;r++) for(let cc=0;cc<n;cc++){
    const p1=pos(r,cc);
    if(cc<n-1){
      const p2=pos(r,cc+1);
      ctx.strokeStyle = hEdges[r][cc]?'#ccc':'rgba(200,0,0,0.12)';
      ctx.lineWidth = hEdges[r][cc]?1.5:0.5;
      ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.stroke();
    }
    if(r<n-1){
      const p2=pos(r+1,cc);
      ctx.strokeStyle = vEdges[r][cc]?'#ccc':'rgba(200,0,0,0.12)';
      ctx.lineWidth = vEdges[r][cc]?1.5:0.5;
      ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.stroke();
    }
  }

  const sz = Math.max(2, Math.min(5, cell*0.3));
  for(let r=0;r<n;r++) for(let cc=0;cc<n;cc++){
    const pp=pos(r,cc);
    if(r===sr&&cc===sc){
      ctx.fillStyle='#e74c3c';
      ctx.beginPath();ctx.arc(pp.x,pp.y,sz+2,0,Math.PI*2);ctx.fill();
    } else if(visited[r][cc]){
      ctx.fillStyle='#2ecc71';
      ctx.beginPath();ctx.arc(pp.x,pp.y,sz,0,Math.PI*2);ctx.fill();
    } else {
      ctx.fillStyle='#ddd';
      ctx.beginPath();ctx.arc(pp.x,pp.y,sz*0.7,0,Math.PI*2);ctx.fill();
    }
  }
}

function updateS5(){

  const sigLoss=beta<=0.01?40:Math.max(1,40*Math.pow(2,-beta));
  const ok=100-roadLoss-sigLoss;
  document.getElementById('s5roadBar').style.width=roadLoss+'%';
  document.getElementById('s5roadBar').textContent=roadLoss.toFixed(0)+'%';
  document.getElementById('s5sigBar').style.width=sigLoss.toFixed(1)+'%';
  document.getElementById('s5sigBar').textContent=sigLoss>=3?sigLoss.toFixed(0)+'%':'';
  document.getElementById('s5okBar').style.width=ok.toFixed(1)+'%';
  document.getElementById('s5okBar').textContent=ok>=5?(lang==='zh'?'得分':'score'):'';
}

const quizData = {};
function answerQuiz(qIdx,aIdx){
  const isZh=lang==='zh';
  const qs=isZh
    ?[{ans:2,explain:'他的信号（薪资排名）可能很准，但他没看到路况（转行空间）。这就是「只看眼前」的代价。'},
      {ans:1,explain:'论文用数学证明了：在分界线附近，给人留退路（比如反悔期）比让信息更准确有效得多。'}]
    :[{ans:2,explain:'Their signal (salary ranking) may be accurate, but they cannot see the road structure (career flexibility). This is the cost of short-sightedness.'},
      {ans:1,explain:'The paper proves mathematically: near the tipping point, giving people a way back (like a cancellation period) is far more effective than making information more accurate.'}];
  const q=qs[qIdx]; if(!q) return;
  for(let i=0;i<3;i++){
    const b=document.getElementById('q'+qIdx+'_'+i);
    if(!b) continue;
    b.disabled=true;
    if(i===q.ans) b.classList.add('picked');
    else if(i===aIdx) b.classList.add('bad');
  }
  const el=document.getElementById('q'+qIdx+'result');
  if(aIdx===q.ans) el.innerHTML=`<div class="result-box result-good">${isZh?'正确！':'Correct!'} ${q.explain}</div>`;
  else el.innerHTML=`<div class="result-box result-bad">${isZh?'不对哦。':'Not quite.'} ${q.explain}</div>`;
}

}

// ========== Choice game (step 0) ==========
function pickOption(btn){
  const val = parseInt(btn.dataset.val);
  const row = document.getElementById('choiceRow');
  const buttons = row.querySelectorAll('.btn-choice');
  buttons.forEach(b=>{
    b.disabled = true;
    const bval = parseInt(b.dataset.val);
    b.querySelector('span').textContent = bval + (lang==='zh'?' 分':' pts');
    if(bval===90) b.classList.add('picked');
    else if(bval===val && val!==90) b.classList.add('bad');
  });
  const el = document.getElementById('choiceResult');
  if(val===90) el.innerHTML = `<div class="result-box result-good">${lang==='zh'?'选到了最高分 90！如果有信号提前告诉你，就不用碰运气了。':'Got the highest score, 90! With a signal to guide you, no need to rely on luck.'}</div>`;
  else el.innerHTML = `<div class="result-box result-bad">${lang==='zh'?'你选到了 '+val+' 分，最高是 90。没有信息的时候只能靠运气。':'You got '+val+'. The highest was 90. Without information, it is just luck.'}</div>`;
}
