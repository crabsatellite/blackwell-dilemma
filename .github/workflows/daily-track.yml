name: Daily Ecosystem Tracker

on:
  schedule:
    # Run daily at 06:00 UTC (15:00 JST)
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up GitHub CLI
        run: |
          gh auth status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Collect daily snapshot
        run: python tracker.py
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate report
        run: python tracker.py --report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/snapshots.json prediction_status.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily snapshot: $(date -u +%Y-%m-%d)"
            git push
          fi
